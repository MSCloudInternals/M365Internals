name: Sync Cmdlet Documentation

on:
  pull_request:
    paths:
      - "M365Internals/functions/**"
      - "M365Internals/internal/functions/**"
      - "README.md"
      - "M365Internals/README.md"
      - "M365Internals/M365Internals.psd1"
      - "M365Ray/CmdletApiMapping.json"
      - "M365Ray Firefox/CmdletApiMapping.json"
      - "M365Ray/TrackedRequestPrefixes.json"
      - "M365Ray Firefox/TrackedRequestPrefixes.json"
      - "build/Sync-CmdletDocumentation.ps1"
      - "build/PortalSurfaceRegistry.ps1"
      - "build/metadata/portal-surface-registry.json"
  workflow_dispatch:

concurrency:
  group: sync-cmdlet-docs-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-docs:
    if: github.event_name != 'pull_request' || !startsWith(github.head_ref, 'sync-cmdlet-docs-')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Run cmdlet documentation sync
        shell: pwsh
        run: |
          ./build/Sync-CmdletDocumentation.ps1 -Verbose

      - name: Check for changes
        id: changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true' && (github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.fork == false)
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: sync cmdlet documentation"
          title: "chore: sync cmdlet documentation"
          body: |
            This PR automatically updates:
            - README.md cmdlet table
            - M365Internals/README.md cmdlet table
            - M365Internals/M365Internals.psd1 FunctionsToExport array
            - M365Ray/CmdletApiMapping.json API mappings
            - M365Ray Firefox/CmdletApiMapping.json API mappings
            - M365Ray/TrackedRequestPrefixes.json tracked prefixes
            - M365Ray Firefox/TrackedRequestPrefixes.json tracked prefixes
            - registry-backed mapping and prefix projections from build/metadata/portal-surface-registry.json

            Generated by the sync-cmdlet-docs workflow.
          add-paths: |
            README.md
            M365Internals/README.md
            M365Internals/M365Internals.psd1
            M365Ray/CmdletApiMapping.json
            M365Ray Firefox/CmdletApiMapping.json
            M365Ray/TrackedRequestPrefixes.json
            M365Ray Firefox/TrackedRequestPrefixes.json
          branch: sync-cmdlet-docs-${{ github.head_ref || github.ref_name }}
          delete-branch: true
